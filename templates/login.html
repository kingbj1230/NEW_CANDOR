{% extends "layout.html" %}

{% block title %}Login{% endblock %}

{% block head %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
{% endblock %}

{% block main %}

<!-- 로그인 및 회원가입 페이지 템플릿 -->
<div class="login-form">
    <div class="container" id="container">
        <div class="form-container sign-up-container">
            <form id="signupForm" action="#" autocomplete="on">
                <h1>회원가입</h1>
                <div class="social-container">
                    <a href="#" class="social"><i class="fab fa-facebook-f"></i></a>
                    <a href="#" class="social"><i class="fab fa-google-plus-g"></i></a>
                    <a href="#" class="social"><i class="fab fa-linkedin-in"></i></a>
                </div>
                <span>이메일로 간편하게 가입하세요</span>
                <input type="text" id="signupName" name="name" placeholder="이름" autocomplete="name">
                <input type="email" id="signupEmail" name="email" placeholder="이메일" autocomplete="email" required>
                <input type="password" id="signupPassword" name="new-password" placeholder="비밀번호" autocomplete="new-password" required>
                <label class="remember-row" for="signupRememberLogin">
                    <input type="checkbox" id="signupRememberLogin">
                    <span>로그인 정보 기억하기</span>
                </label>
                <button type="submit">회원가입</button>
            </form>
        </div>

        <div class="form-container sign-in-container">
            <form id="loginForm" action="#" autocomplete="on">
                <h1>로그인</h1>
                <div class="social-container">
                    <a href="#" class="social"><i class="fab fa-facebook-f"></i></a>
                    <a href="#" class="social"><i class="fab fa-google-plus-g"></i></a>
                    <a href="#" class="social"><i class="fab fa-linkedin-in"></i></a>
                </div>
                <span>가입한 계정으로 로그인하세요</span>
                <input type="email" id="loginEmail" name="username" placeholder="이메일" autocomplete="username" required>
                <input type="password" id="loginPassword" name="password" placeholder="비밀번호" autocomplete="current-password" required>
                <label class="remember-row" for="loginRememberLogin">
                    <input type="checkbox" id="loginRememberLogin">
                    <span>로그인 정보 기억하기</span>
                </label>
                <a href="#">비밀번호를 잊으셨나요?</a>
                <button type="submit">로그인</button>
            </form>
        </div>

        <div class="overlay-container">
            <div class="overlay">
                <div class="overlay-panel overlay-left">
                    <h1>다시 오신 걸 환영해요!</h1>
                    <p>이미 계정이 있다면 로그인해서 계속 이용해 주세요.</p>
                    <button type="button" class="ghost" id="signIn">로그인</button>
                </div>
                <div class="overlay-panel overlay-right">
                    <h1>처음 오셨나요?</h1>
                    <p>간단한 정보 입력 후 공약 트래커를 시작해 보세요.</p>
                    <button type="button" class="ghost" id="signUp">회원가입</button>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
