{% extends "layout.html" %}

{% block title %}정치인 상세페이지{% endblock %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/browse.css', v='20260317r2') }}">
{% endblock %}

{% block main %}
<section class="browse-shell politician-page">
    <div class="browse-hero">
        <h1>정치인 상세페이지</h1>
        <p>선거별 공약 구조와 이행률을 확인할 수 있습니다.</p>
    </div>

    <div id="browseMessage" class="browse-message" aria-live="polite"></div>

    <div class="mb-3 d-flex gap-2 align-items-center">
        <a class="btn btn-outline-secondary btn-sm" href="/politicians">목록으로 돌아가기</a>
        <span id="adminBadge" class="admin-badge" hidden>관리자 모드</span>
    </div>

    <section id="politicianDetailLoading" class="detail-loading-card" role="status" aria-live="polite">
        <div class="detail-loading-spinner" aria-hidden="true"></div>
        <p class="detail-loading-title">정치인 상세페이지를 불러오는 중입니다.</p>
        <p class="detail-loading-sub">선거별 공약과 이행 정보를 준비하고 있습니다.</p>
    </section>

    <section id="politicianDetailPanel" class="politician-detail" hidden>
        <article id="politicianProfile" class="politician-profile"></article>

        <div class="politician-pledges-head">
            <h3>선거별 공약</h3>
            <span id="politicianPledgeCount">0건</span>
        </div>
        <div id="politicianPledgeList" class="promise-list"></div>
    </section>

    <div id="progressEditorModal" class="progress-modal" hidden>
        <div class="progress-modal-backdrop" data-action="close-progress-editor"></div>
        <div class="progress-modal-panel" role="dialog" aria-modal="true" aria-labelledby="progressEditorTitle">
            <div class="progress-modal-head">
                <h3 id="progressEditorTitle">이행률 평가 입력</h3>
                <button type="button" class="progress-close-btn" data-action="close-progress-editor">닫기</button>
            </div>
            <p id="progressEditorNodePath" class="progress-node-path">평가 대상을 선택해 주세요.</p>

            <form id="progressEditorForm" class="progress-form" novalidate>
                <input id="progressEditorNodeId" type="hidden">
                <input id="progressEditorSourceId" type="hidden">

                <div class="field-row">
                    <div class="field">
                        <label for="progressEditorRate">이행 점수</label>
                        <select id="progressEditorRate" required>
                            <option value="5">5.0</option>
                            <option value="4.5">4.5</option>
                            <option value="4">4.0</option>
                            <option value="3.5">3.5</option>
                            <option value="3">3.0</option>
                            <option value="2.5">2.5</option>
                            <option value="2">2.0</option>
                            <option value="1.5">1.5</option>
                            <option value="1">1.0</option>
                            <option value="0.5">0.5</option>
                            <option value="0">0.0</option>
                        </select>
                    </div>
                    <div class="field">
                        <label for="progressEditorStatus">상태</label>
                        <select id="progressEditorStatus" required>
                            <option value="not_started">미착수</option>
                            <option value="in_progress">진행 중</option>
                            <option value="partially_completed">부분 완료</option>
                            <option value="completed">완료</option>
                            <option value="failed">실패</option>
                            <option value="unknown">미확인</option>
                        </select>
                    </div>
                </div>

                <div class="field-row">
                    <div class="field">
                        <label for="progressEditorEvaluator">평가 주체</label>
                        <input id="progressEditorEvaluator" type="text" placeholder="예: 시민단체">
                    </div>
                    <div class="field">
                        <label for="progressEditorDate">평가 기준일</label>
                        <input id="progressEditorDate" type="date" required>
                    </div>
                </div>

                <div class="field">
                    <label for="progressEditorReason">평가 이유</label>
                    <textarea id="progressEditorReason" rows="3" placeholder="평가 근거를 입력해 주세요."></textarea>
                </div>

                <div class="divider">근거 출처</div>

                <div class="field">
                    <label for="progressEditorSourceTitle">출처 제목</label>
                    <input id="progressEditorSourceTitle" type="text" placeholder="예: 보도자료 제목">
                </div>

                <div class="field">
                    <label for="progressEditorSourceUrl">출처 URL</label>
                    <input id="progressEditorSourceUrl" type="url" placeholder="https://...">
                </div>

                <div class="field-row">
                    <div class="field">
                        <label for="progressEditorSourceType">출처 유형</label>
                        <select id="progressEditorSourceType">
                            <option value="">선택 안 함</option>
                            <option value="정부">정부</option>
                            <option value="언론">언론</option>
                            <option value="보고서">보고서</option>
                            <option value="연구">연구</option>
                            <option value="예산">예산</option>
                            <option value="보도자료">보도자료</option>
                            <option value="연설">연설</option>
                            <option value="법령">법령</option>
                        </select>
                    </div>
                    <div class="field">
                        <label for="progressEditorSourceDate">출처 발행일</label>
                        <input id="progressEditorSourceDate" type="date">
                    </div>
                </div>

                <div class="field">
                    <label for="progressEditorSourcePublisher">발행기관</label>
                    <input id="progressEditorSourcePublisher" type="text" placeholder="예: 기획재정부">
                </div>

                <div class="field">
                    <label for="progressEditorSourceSummary">출처 요약</label>
                    <textarea id="progressEditorSourceSummary" rows="2" placeholder="핵심 요약"></textarea>
                </div>

                <div class="field-row">
                    <div class="field">
                        <label for="progressEditorSourceRole">출처 역할</label>
                        <select id="progressEditorSourceRole">
                            <option value="primary">주요 근거</option>
                            <option value="supporting">보조 근거</option>
                            <option value="counter">반박 자료</option>
                        </select>
                    </div>
                    <div class="field">
                        <label for="progressEditorPageNo">페이지 번호</label>
                        <input id="progressEditorPageNo" type="text" placeholder="예: 12">
                    </div>
                </div>

                <div class="field">
                    <label for="progressEditorQuote">인용 문장</label>
                    <input id="progressEditorQuote" type="text" placeholder="핵심 인용문">
                </div>

                <div class="field">
                    <label for="progressEditorLinkNote">연결 메모</label>
                    <textarea id="progressEditorLinkNote" rows="2" placeholder="출처 연결 메모"></textarea>
                </div>

                <div class="progress-form-actions">
                    <button type="button" class="outline-btn" data-action="close-progress-editor">취소</button>
                    <button id="progressEditorSaveBtn" type="submit">평가 저장</button>
                </div>
            </form>
        </div>
    </div>

</section>

<script nonce="{{ csp_nonce }}">
    window.POLITICIAN_DETAIL_ID = {{ candidate_id | tojson }};
</script>
<script src="{{ url_for('static', filename='js/politicianDetail.js', v='20260317r2') }}"></script>
{% endblock %}
