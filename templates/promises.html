{% extends "layout.html" %}

{% block title %}공약{% endblock %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/browse.css', v='20260313r4') }}">
{% endblock %}

{% block main %}
<section class="browse-shell promise-page">
    <div class="browse-hero">
        <h1>공약 살펴보기</h1>
        <p>후보와 선거를 먼저 좁힌 뒤 공약을 살펴볼 수 있습니다.</p>
    </div>

    <div id="browseMessage" class="browse-message" aria-live="polite"></div>

    <div class="browse-controls promise-controls promise-controls-grid">
        <div class="filter-field wide">
            <label for="promiseSearchInput">검색</label>
            <input id="promiseSearchInput" type="search" placeholder="후보자 이름, 공약 제목 검색">
        </div>
        <div class="filter-field">
            <label for="promiseCandidateFilter">후보</label>
            <select id="promiseCandidateFilter">
                <option value="">전체 후보</option>
            </select>
        </div>
        <div class="filter-field">
            <label for="promiseElectionFilter">선거</label>
            <select id="promiseElectionFilter">
                <option value="">전체 선거</option>
            </select>
        </div>
        <div class="filter-field">
            <label for="promiseCategoryFilter">카테고리</label>
            <select id="promiseCategoryFilter">
                <option value="">전체 카테고리</option>
            </select>
        </div>
    </div>
    <p class="promise-explore-hint">검색 조건이 없으면 무작위 10개 항목이 표시됩니다. 카드 전체를 누르면 해당 후보 상세 페이지로 이동합니다.</p>

    <div id="promiseList" class="promise-list"></div>
</section>

<script src="{{ url_for('static', filename='js/browse.js', v='20260313r2') }}"></script>
{% endblock %}
