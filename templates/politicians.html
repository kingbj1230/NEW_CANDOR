{% extends "layout.html" %}

{% block title %}정치인{% endblock %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/browse.css', v='20260313r4') }}">
{% endblock %}

{% block main %}
<section class="browse-shell politician-page">
    <div class="browse-hero">
        <h1>정치인 찾기</h1>
        <p>후보자 등록에 저장된 데이터를 기반으로 이름, 정당, 직책을 검색할 수 있습니다.</p>
    </div>

    <div id="browseMessage" class="browse-message" aria-live="polite"></div>

    <div class="browse-controls">
        <input id="politicianSearchInput" type="search" placeholder="이름 / 정당 / 직책 검색">
        <button id="refreshPoliticiansBtn" type="button">새로고침</button>
    </div>

    <div id="politicianList" class="politician-grid"></div>
</section>

<script src="{{ url_for('static', filename='js/browse.js', v='20260326r1') }}"></script>
{% endblock %}
